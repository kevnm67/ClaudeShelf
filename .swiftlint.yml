# SwiftLint Configuration for ClaudeShelf
# See: https://realm.github.io/SwiftLint/rule-directory.html

excluded:
  - ClaudeShelf.xcodeproj
  - DerivedData
  - .build

reporter: xcode

# Rules explicitly enabled (opt-in rules)
opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - toggle_bool
  - unavailable_function

# Rules explicitly disabled
disabled_rules:
  - line_length
  - todo
  - nesting
  - trailing_comma  # SwiftFormat enforces trailing commas (--trailingCommas always)
  - implicit_optional_initialization  # Explicit = nil on optionals is clearer for @Observable properties
  - opening_brace  # SwiftFormat places opening braces per its own rules for multiline conditions

# Allow common short identifiers
identifier_name:
  excluded:
    - fm
    - id
    - s

# Slightly raise thresholds for recursive scanner and multi-pattern highlighter
function_body_length:
  warning: 80
  error: 150

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

# Allow 6 params for recursive scanner methods that pass context through
function_parameter_count:
  warning: 6
  error: 8
